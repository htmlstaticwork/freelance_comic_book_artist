<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER | INK STORM PORTFOLIO</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23111111' rx='20'/><path d='M50 20 L30 60 L50 60 L40 85 L70 45 L50 45 L60 20 Z' fill='%23FF3D00'/></svg>">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            padding: 2rem;
            position: relative;
        }

        .auth-controls {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
        }

        .auth-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            border-radius: 4px;
        }

        .auth-card .logo {
            display: inline-block;
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }

        .auth-card h2 {
            margin-bottom: 2.5rem;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.5;
            transition: var(--transition-fast);
        }

        .password-toggle:hover {
            opacity: 1;
            color: var(--secondary-color);
        }

        .social-login {
            margin-top: 2.5rem;
        }

        .social-login p {
            margin-bottom: 1.5rem;
            font-size: 0.8rem;
            font-weight: 700;
            opacity: 0.5;
            position: relative;
        }

        .social-login p::before, .social-login p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: var(--border-color);
        }

        .social-login p::before { left: 0; }
        .social-login p::after { right: 0; }

        .social-btns {
            display: flex;
            gap: 1rem;
        }

        .social-btn {
            flex: 1;
            padding: 1rem;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text);
            font-family: inherit;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .social-btn:hover {
            border-color: var(--secondary-color);
            background: rgba(255, 61, 0, 0.05);
        }

        .auth-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--secondary-color);
            font-weight: 700;
        }

        [dir="rtl"] .password-toggle {
            right: auto;
            left: 1.2rem;
        }

        [dir="rtl"] .auth-controls {
            right: auto;
            left: 2rem;
        }

        /* Responsive Fixes for Mobile & Tablet */
        @media (max-width: 768px) {
            .auth-card {
                padding: 2.5rem 2rem;
            }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.25rem;
            }
        }
    </style>
</head>
<body class="dark-mode">

    <div class="auth-controls">
        <button id="theme-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
        <button id="rtl-toggle" title="Toggle RTL"><i class="fas fa-language"></i></button>
    </div>

    <div class="auth-card">
        <a href="index.html" class="logo">INK<span>STORM</span></a>
        <h2>JOIN THE SQUAD</h2>

        <form>
            <div class="form-group">
                <input type="text" placeholder="FULL NAME" required>
            </div>
            <div class="form-group">
                <input type="email" placeholder="EMAIL ADDRESS" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="PASSWORD" required>
                <i class="fas fa-eye password-toggle" id="toggle-password"></i>
            </div>

            <button type="submit" class="btn btn-primary full-width">REGISTER</button>
        </form>

        <div class="social-login">
            <p>OR REGISTER WITH</p>
            <div class="social-btns">
                <button class="social-btn"><i class="fab fa-google"></i> Google</button>
                <button class="social-btn"><i class="fab fa-apple"></i> Apple</button>
            </div>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
    <script>
        // Password Show/Hide Toggle
        const togglePassword = document.getElementById('toggle-password');
        const password = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
